# TEMPLATE — substitua api.seudominio.com.br pelo seu domínio NA VPS.
# Não commite arquivos com domínio/senha reais. Use *.local.conf (gitignored).
# Salvar na VPS em: /etc/nginx/sites-available/crm-api

server {
    listen 80;
    server_name api.seudominio.com.br;

    # Redirecionar para HTTPS (após configurar SSL com certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}

# Após certbot, o bloco HTTPS será criado automaticamente.
# O proxy_pass continua apontando para http://127.0.0.1:8000
